---
layout: default
---
<div class="doc-wrap">
  <article class="doc">
    <div class="doc-meta">
      {% for cat in page.categories %}<span class="doc-category">{{ cat }}</span>{% endfor %}
    </div>
    <h1 class="doc-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="doc-description">{{ page.description }}</p>
    {% endif %}
    <div class="doc-body">
      {{ content }}
    </div>
  </article>

  <aside id="toc-wrap" class="toc-sidebar">
    <div class="toc-label">On this page</div>
    <div id="toc-nav"></div>
  </aside>
</div>
